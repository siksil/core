  - tests/components/sensor/**
  - tests/hassfest/**
  - tests/helpers/**
  - tests/mock/**
  - tests/pylint/**
  - tests/scripts/**
  - tests/test_util/**
  - tests/testing_config/**
  - tests/util/**

other: &other
  - .github/workflows/**
  - inpui/scripts/**

requirements: &requirements
  - .github/workflows/**
  - inpui/package_constraints.txt
  - requirements*.txt
  - pyproject.toml
  - script/licenses.py

any:
  - *base_platforms
  - *components
  - *core
  - *other
  - *requirements
  - *tests
