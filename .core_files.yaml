# Defines a list of files that are part of main core of Inpui.
# Changes to these files/filters define how our CI test suite is ran.
core: &core
  - inpui/*.py
  - inpui/auth/**
  - inpui/helpers/**
  - inpui/package_constraints.txt
  - inpui/util/**
  - mypy.ini
  - pyproject.toml
  - requirements.txt
  - setup.cfg

# Our base platforms, that are used by other integrations
