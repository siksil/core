repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
        files: ^((inpui|pylint|script|tests)/.+)?[^/]+\.(py|pyi)$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=aiport,astroid,checkin,currenty,hass,iif,incomfort,lookin,nam,NotIn
          - --skip="./.*,*.csv,*.json,*.ambr"
          - --quiet-level=2
        exclude_types: [csv, json, html]
        exclude: ^tests/fixtures/|inpui/generated/|tests/components/.*/snapshots/
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
        args:
          - --pedantic
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-executables-have-shebangs
        stages: [manual]
      - id: check-json
        exclude: (.vscode|.devcontainer)
      - id: no-commit-to-branch
        args:
          - --branch=dev
          - --branch=master
          - --branch=rc
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.6.2
          - prettier-plugin-sort-json@4.2.0
  - repo: https://github.com/cdce8p/python-typing-update
    rev: v0.6.0
    hooks:
      # Run `python-typing-update` hook manually from time to time
      # to update python typing syntax.
      # Will require manual work, before submitting changes!
      # prek run --hook-stage manual python-typing-update --all-files
      - id: python-typing-update
        stages: [manual]
        args:
          - --py311-plus
          - --force
          - --keep-updates
        files: ^(inpui|tests|script)/.+\.py$
  - repo: local
    hooks:
      # Run mypy through our wrapper script in order to get the possible
      # pyenv and/or virtualenv activated; it may not have been e.g. if
      # committing from a GUI tool that was not launched from an activated
      # shell.
      - id: mypy
        name: mypy
        entry: script/run-in-env.sh mypy
        language: script
        require_serial: true
        types_or: [python, pyi]
        files: ^(inpui|pylint)/.+\.(py|pyi)$
      - id: pylint
        name: pylint
        entry: script/run-in-env.sh pylint --ignore-missing-annotations=y
        language: script
        require_serial: true
        types_or: [python, pyi]
        files: ^(inpui|tests)/.+\.(py|pyi)$
      - id: gen_requirements_all
        name: gen_requirements_all
        entry: script/run-in-env.sh python3 -m script.gen_requirements_all
        pass_filenames: false
        language: script
        types: [text]
        files: ^(inpui/.+/manifest\.json|inpui/brands/.+\.json|pyproject\.toml|\.pre-commit-config\.yaml|script/gen_requirements_all\.py)$
      - id: inpsfest
        name: inpsfest
        entry: script/run-in-env.sh python3 -m script.inpsfest
        pass_filenames: false
        language: script
        types: [text]
        files: ^(inpui/.+/(icons|manifest|strings)\.json|inpui/.+/(conditions|quality_scale|services|triggers)\.yaml|inpui/brands/.*\.json|script/inpsfest/(?!metadata|mypy_config).+\.py|requirements.+\.txt)$
      - id: inpsfest-metadata
        name: inpsfest-metadata
        entry: script/run-in-env.sh python3 -m script.inpsfest -p metadata,docker
        pass_filenames: false
        language: script
        types: [text]
        files: ^(script/inpsfest/metadata|docker)\.py|inpui/const\.py$|pyproject\.toml)$
      - id: inpsfest-mypy-config
        name: inpsfest-mypy-config
        entry: script/run-in-env.sh python3 -m script.inpsfest -p mypy_config
        pass_filenames: false
        language: script
        types: [text]
        files: ^(script/inpsfest/mypy_config\.py|\.strict-typing|mypy\.ini)$
